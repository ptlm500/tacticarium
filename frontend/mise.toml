[tasks.install]
description = "Install frontend pnpm dependencies"
run = "pnpm install"
sources = ["package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml"]

[tasks.test]
description = "Run frontend tests (Vitest browser mode)"
depends = [":install"]
run = "pnpm exec vp test run"

[tasks.check]
description = "Run frontend format/lint/typecheck"
depends = [":install"]
run = "pnpm exec vp check"
