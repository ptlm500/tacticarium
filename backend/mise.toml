[tools]
golangci-lint = "2.11.4"
gofumpt = "0.9.1"

[tasks.install]
description = "Download Go module dependencies"
run = "go mod download"
sources = ["go.mod", "go.sum"]

[tasks.test]
description = "Run backend Go tests"
run = "go test ./..."

[tasks.lint]
description = "Run Go linter (golangci-lint)"
run = "golangci-lint run ./..."

[tasks.fmt]
description = "Format Go code (gofumpt)"
run = "gofumpt -w ."
